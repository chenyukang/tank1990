name: CI

on:
  pull_request:
  push:
    branches:
      - "**"

permissions:
  contents: read

env:
  RUST_TOOLCHAIN: "1.95.0"

jobs:
  fmt:
    name: fmt
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        run: |
          rustup toolchain install ${{ env.RUST_TOOLCHAIN }} --profile minimal --component rustfmt --component clippy
          rustup default ${{ env.RUST_TOOLCHAIN }}

      - name: Check formatting
        run: cargo fmt --all -- --check

  test:
    name: test, clippy, release build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            os: ubuntu-latest
          - name: macos
            os: macos-latest
          - name: windows
            os: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libgl1-mesa-dev \
            libudev-dev \
            libwayland-dev \
            libx11-dev \
            libxcursor-dev \
            libxi-dev \
            libxinerama-dev \
            libxkbcommon-dev \
            libxrandr-dev \
            pkg-config
          sudo apt-get install -y libasound2-dev || sudo apt-get install -y libasound2t64-dev

      - name: Install Rust
        run: |
          rustup toolchain install ${{ env.RUST_TOOLCHAIN }} --profile minimal --component rustfmt --component clippy
          rustup default ${{ env.RUST_TOOLCHAIN }}

      - name: Run tests
        run: cargo test --locked

      - name: Run clippy
        run: cargo clippy --locked --all-targets -- -D warnings

      - name: Build release binary
        run: cargo build --locked --release

  web:
    name: wasm web package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        run: |
          rustup toolchain install ${{ env.RUST_TOOLCHAIN }} --profile minimal
          rustup default ${{ env.RUST_TOOLCHAIN }}
          rustup target add wasm32-unknown-unknown

      - name: Install wasm-bindgen
        run: scripts/install-wasm-bindgen.sh

      - name: Install Binaryen
        run: |
          sudo apt-get update
          sudo apt-get install -y binaryen

      - name: Build web package
        run: scripts/build-web.sh

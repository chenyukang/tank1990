name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  actions: read
  contents: write

env:
  RUST_TOOLCHAIN: "1.95.0"

jobs:
  verify-tag:
    name: Verify release tag
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check tag matches Cargo version
        run: |
          version="$(awk -F '"' '/^version = / { print $2; exit }' Cargo.toml)"
          expected="v${version}"
          if [ "${GITHUB_REF_NAME}" != "${expected}" ]; then
            echo "Release tag ${GITHUB_REF_NAME} must match Cargo.toml version ${expected}" >&2
            exit 1
          fi

  build:
    name: Build ${{ matrix.name }}
    needs: verify-tag
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            archive: tank-linux-x86_64.tar.gz
            binary: target/release/tank
          - name: macos
            os: macos-latest
            archive: tank-macos.tar.gz
            binary: target/release/tank
          - name: windows-x86_64
            os: windows-latest
            archive: tank-windows-x86_64.zip
            binary: target/release/tank.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libgl1-mesa-dev \
            libudev-dev \
            libwayland-dev \
            libx11-dev \
            libxcursor-dev \
            libxi-dev \
            libxinerama-dev \
            libxkbcommon-dev \
            libxrandr-dev \
            pkg-config
          sudo apt-get install -y libasound2-dev || sudo apt-get install -y libasound2t64-dev

      - name: Install Rust
        run: |
          rustup toolchain install ${{ env.RUST_TOOLCHAIN }} --profile minimal --component rustfmt --component clippy
          rustup default ${{ env.RUST_TOOLCHAIN }}

      - name: Build release binary
        run: cargo build --locked --release

      - name: Package Unix binary
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          cp "${{ matrix.binary }}" dist/tank
          chmod +x dist/tank
          tar -czf "dist/${{ matrix.archive }}" -C dist tank

      - name: Package Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "${{ matrix.binary }}" "dist/tank.exe"
          Compress-Archive -Path "dist/tank.exe" -DestinationPath "dist/${{ matrix.archive }}" -Force

      - name: Upload packaged binary
        uses: actions/upload-artifact@v7
        with:
          path: dist/${{ matrix.archive }}
          archive: false
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download packaged binaries
        uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: tank-*
          merge-multiple: true

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release view "$TAG" >/dev/null 2>&1 || gh release create "$TAG" --title "$TAG" --generate-notes
          gh release upload "$TAG" dist/* --clobber

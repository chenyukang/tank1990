<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark" />
    <link rel="icon" href="data:," />
    <title>Tank 1990</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #000;
      }

      body {
        display: grid;
        place-items: center;
      }

      canvas {
        display: block;
        outline: none;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }

      #loading {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background: #000;
        color: #d9ddb9;
        font: 700 20px/1.4 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        letter-spacing: 0;
      }

      #loading[hidden] {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="loading">LOADING</div>
    <script type="module">
      const loading = document.getElementById("loading");
      const blockedCodes = new Set([
        "ArrowUp",
        "ArrowDown",
        "ArrowLeft",
        "ArrowRight",
        "Space",
        "Tab",
      ]);

      window.addEventListener(
        "keydown",
        (event) => {
          if (blockedCodes.has(event.code)) {
            event.preventDefault();
          }
        },
        { passive: false },
      );

      const focusCanvas = () => {
        const canvas = document.querySelector("canvas");
        if (!canvas) {
          return;
        }
        canvas.tabIndex = 0;
        canvas.focus();
      };

      window.addEventListener("pointerdown", focusCanvas, { passive: true });

      try {
        const { default: init } = await import("./pkg/tank.js");
        await init();
        loading.hidden = true;
        requestAnimationFrame(focusCanvas);
      } catch (error) {
        console.error(error);
        loading.textContent = "FAILED TO LOAD";
      }
    </script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark" />
    <link rel="icon" href="data:," />
    <title>Tank 1990</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #000;
      }

      body {
        display: grid;
        place-items: center;
      }

      canvas {
        display: block;
        outline: none;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }

      #loading {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background: #000;
        color: #d9ddb9;
        font: 700 20px/1.4 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        letter-spacing: 0;
      }

      #loading[hidden] {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="loading">CLICK TO START</div>
    <script type="module">
      const loading = document.getElementById("loading");
      let started = false;
      const audioContexts = [];
      const blockedCodes = new Set([
        "ArrowUp",
        "ArrowDown",
        "ArrowLeft",
        "ArrowRight",
        "Space",
        "Tab",
      ]);
      const startCodes = new Set(["Enter", "Space"]);

      const NativeAudioContext = window.AudioContext || window.webkitAudioContext;

      if (NativeAudioContext) {
        try {
          const PatchedAudioContext = function (...args) {
            const context = new NativeAudioContext(...args);
            audioContexts.push(context);
            return context;
          };

          Object.setPrototypeOf(PatchedAudioContext, NativeAudioContext);
          PatchedAudioContext.prototype = NativeAudioContext.prototype;
          window.AudioContext = PatchedAudioContext;
          if (window.webkitAudioContext === NativeAudioContext) {
            window.webkitAudioContext = PatchedAudioContext;
          }
        } catch (_error) {
          audioContexts.length = 0;
        }
      }

      const resumeAudioContexts = () => {
        for (const context of audioContexts) {
          if (context.state !== "suspended") {
            continue;
          }

          try {
            const resume = context.resume();
            if (resume && typeof resume.catch === "function") {
              resume.catch(() => {});
            }
          } catch (_error) {
            // The next user gesture will try again.
          }
        }
      };

      const unlockAudioSoon = () => {
        resumeAudioContexts();
        window.setTimeout(resumeAudioContexts, 0);
        window.setTimeout(resumeAudioContexts, 100);
        window.setTimeout(resumeAudioContexts, 500);
      };

      const focusCanvas = () => {
        const canvas = document.querySelector("canvas");
        if (!canvas) {
          return;
        }
        canvas.tabIndex = 0;
        canvas.focus();
      };

      const startGame = async (event) => {
        event?.preventDefault();
        unlockAudioSoon();
        if (started) {
          focusCanvas();
          return;
        }

        started = true;
        loading.textContent = "LOADING";

        try {
          const { default: init } = await import("./pkg/tank.js");
          await init();
          loading.hidden = true;
          requestAnimationFrame(focusCanvas);
          unlockAudioSoon();
        } catch (error) {
          console.error(error);
          loading.textContent = "FAILED TO LOAD";
        }
      };

      window.addEventListener(
        "keydown",
        (event) => {
          if (blockedCodes.has(event.code)) {
            event.preventDefault();
          }
          unlockAudioSoon();
          if (!started && startCodes.has(event.code)) {
            void startGame(event);
          }
        },
        { passive: false },
      );

      window.addEventListener(
        "pointerdown",
        (event) => {
          if (!started) {
            void startGame(event);
          } else {
            unlockAudioSoon();
            focusCanvas();
          }
        },
        { passive: false },
      );
    </script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="color-scheme" content="dark" />
    <link rel="icon" href="data:," />
    <title>Tank 1990</title>
    <style>
      :root {
        --app-width: 100vw;
        --app-height: 100dvh;
        --game-aspect: calc(304 / 240);
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #000;
        overscroll-behavior: none;
      }

      body {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        box-sizing: border-box;
        height: var(--app-height);
        padding:
          env(safe-area-inset-top, 0)
          env(safe-area-inset-right, 0)
          env(safe-area-inset-bottom, 0)
          env(safe-area-inset-left, 0);
        touch-action: none;
        user-select: none;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
      }

      #game-shell {
        position: relative;
        flex: 0 0 auto;
        width: min(100%, calc(var(--app-height) * var(--game-aspect)));
        height: min(100%, calc(var(--app-width) / var(--game-aspect)));
        overflow: hidden;
        background: #000;
      }

      #game-shell:fullscreen,
      #game-shell:-webkit-full-screen {
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
        width: 100vw !important;
        height: 100dvh !important;
        background: #000 !important;
      }

      #bevy-canvas {
        display: block;
        width: 100%;
        height: 100%;
        outline: none;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        touch-action: none;
      }

      #game-shell:fullscreen #bevy-canvas,
      #game-shell:-webkit-full-screen #bevy-canvas {
        flex: 0 0 auto !important;
        width: min(100vw, calc(100dvh * var(--game-aspect))) !important;
        height: min(100dvh, calc(100vw / var(--game-aspect))) !important;
      }

      #loading {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        box-sizing: border-box;
        padding:
          max(16px, env(safe-area-inset-top))
          max(16px, env(safe-area-inset-right))
          max(16px, env(safe-area-inset-bottom))
          max(16px, env(safe-area-inset-left));
        background: #000;
        color: #d9ddb9;
        text-align: center;
        font: 700 clamp(14px, 4.5vw, 20px) / 1.4 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        letter-spacing: 0;
        touch-action: none;
      }

      #loading[hidden] {
        display: none;
      }
    </style>
  </head>
  <body>
    <main id="game-shell">
      <canvas id="bevy-canvas"></canvas>
    </main>
    <div id="loading">CLICK TO START</div>
    <script type="module">
      const loading = document.getElementById("loading");
      const gameShell = document.getElementById("game-shell");
      const canvas = document.getElementById("bevy-canvas");
      let started = false;
      const audioContexts = [];
      const blockedCodes = new Set([
        "ArrowUp",
        "ArrowDown",
        "ArrowLeft",
        "ArrowRight",
        "Space",
        "Tab",
      ]);
      const startCodes = new Set(["Enter", "Space"]);

      const NativeAudioContext = window.AudioContext || window.webkitAudioContext;

      if (NativeAudioContext) {
        try {
          const PatchedAudioContext = function (...args) {
            const context = new NativeAudioContext(...args);
            audioContexts.push(context);
            return context;
          };

          Object.setPrototypeOf(PatchedAudioContext, NativeAudioContext);
          PatchedAudioContext.prototype = NativeAudioContext.prototype;
          window.AudioContext = PatchedAudioContext;
          if (window.webkitAudioContext === NativeAudioContext) {
            window.webkitAudioContext = PatchedAudioContext;
          }
        } catch (_error) {
          audioContexts.length = 0;
        }
      }

      const resumeAudioContexts = () => {
        for (const context of audioContexts) {
          if (context.state !== "suspended") {
            continue;
          }

          try {
            const resume = context.resume();
            if (resume && typeof resume.catch === "function") {
              resume.catch(() => {});
            }
          } catch (_error) {
            // The next user gesture will try again.
          }
        }
      };

      const unlockAudioSoon = () => {
        resumeAudioContexts();
        window.setTimeout(resumeAudioContexts, 0);
        window.setTimeout(resumeAudioContexts, 100);
        window.setTimeout(resumeAudioContexts, 500);
      };

      const syncViewport = () => {
        const viewport = window.visualViewport;
        const width = Math.max(1, viewport?.width ?? window.innerWidth);
        const height = Math.max(1, viewport?.height ?? window.innerHeight);

        document.documentElement.style.setProperty("--app-width", `${width}px`);
        document.documentElement.style.setProperty("--app-height", `${height}px`);
      };

      const syncViewportSoon = () => {
        syncViewport();
        requestAnimationFrame(syncViewport);
        window.setTimeout(syncViewport, 250);
      };

      const focusCanvas = () => {
        canvas.tabIndex = 0;
        canvas.focus();
      };

      const currentFullscreenElement = () =>
        document.fullscreenElement || document.webkitFullscreenElement;

      const toggleGameShellFullscreen = async () => {
        const fullscreenElement = currentFullscreenElement();
        try {
          if (fullscreenElement) {
            const exitFullscreen =
              document.exitFullscreen || document.webkitExitFullscreen;
            if (exitFullscreen) {
              await exitFullscreen.call(document);
            }
          } else {
            const requestFullscreen =
              gameShell.requestFullscreen || gameShell.webkitRequestFullscreen;
            if (requestFullscreen) {
              await requestFullscreen.call(gameShell);
            }
          }
        } catch (_error) {
          // Browsers can reject fullscreen outside accepted user gestures.
        }
      };

      const startGame = async (event) => {
        event?.preventDefault();
        unlockAudioSoon();
        if (started) {
          focusCanvas();
          return;
        }

        started = true;
        loading.textContent = "LOADING";

        try {
          const { default: init } = await import("./pkg/tank.js");
          await init();
          loading.hidden = true;
          requestAnimationFrame(focusCanvas);
          unlockAudioSoon();
        } catch (error) {
          console.error(error);
          loading.textContent = "FAILED TO LOAD";
        }
      };

      window.addEventListener(
        "keydown",
        (event) => {
          if (
            started &&
            event.code === "KeyF" &&
            !event.altKey &&
            !event.ctrlKey &&
            !event.metaKey
          ) {
            event.preventDefault();
            event.stopImmediatePropagation();
            unlockAudioSoon();
            void toggleGameShellFullscreen().finally(() => {
              syncViewportSoon();
              requestAnimationFrame(focusCanvas);
            });
          }
        },
        { capture: true, passive: false },
      );

      window.addEventListener(
        "keydown",
        (event) => {
          if (blockedCodes.has(event.code)) {
            event.preventDefault();
          }
          unlockAudioSoon();
          if (!started && startCodes.has(event.code)) {
            void startGame(event);
          }
        },
        { passive: false },
      );

      window.addEventListener(
        "pointerdown",
        (event) => {
          if (!started) {
            void startGame(event);
          } else {
            unlockAudioSoon();
            focusCanvas();
          }
        },
        { passive: false },
      );

      window.addEventListener(
        "touchmove",
        (event) => {
          event.preventDefault();
        },
        { passive: false },
      );
      window.addEventListener("contextmenu", (event) => event.preventDefault());
      window.addEventListener("resize", syncViewportSoon);
      window.addEventListener("orientationchange", syncViewportSoon);
      const handleFullscreenChange = () => {
        syncViewportSoon();
        requestAnimationFrame(focusCanvas);
      };
      document.addEventListener("fullscreenchange", handleFullscreenChange);
      document.addEventListener("webkitfullscreenchange", handleFullscreenChange);
      window.visualViewport?.addEventListener("resize", syncViewportSoon);
      window.visualViewport?.addEventListener("scroll", syncViewportSoon);
      syncViewportSoon();
    </script>
  </body>
</html>
